      <div class="card" style="flex:1;min-width:170px;border-color:${mp>0?'var(--accent)':'var(--rule)'}">
        <h3>Max MP <span style="color:var(--cyan);text-transform:none;font-size:.9rem">+${mp}</span></h3>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:8px">${eff.mpMax||0} → ${(eff.mpMax||0)+mp}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="sp-btn" onclick="adjSP('mp',-1)" ${mp<=0?'disabled':''}>−</button>
          <span style="font-size:1.3rem;font-weight:700;min-width:28px;text-align:center">${mp}</span>
          <button class="sp-btn" onclick="adjSP('mp',1)" ${rem<=0?'disabled':''}>+</button>
        </div>
      </div>
    </div>
    <div class="${rem===0?'good-box':'warn-box'}">${rem} point${rem!==1?'s':''} remaining.${rem===0?' ✓ All allocated.':''}</div>
  </div>`;
}
function adjSP(t,d) {
  if (t==='hp') {
    const n=session.hpGain+d;
    if(n<0||n>session.statusPoints-session.mpGain) return;
    session.hpGain=n;
  } else {
    const n=session.mpGain+d;
    if(n<0||n>session.statusPoints-session.hpGain) return;
    session.mpGain=n;
  }
  renderStep();
}

// ── Skills ───────────────────────────────────────────────────────────
function renderSkills() {
  const cap=session.lvlData.skillCap, total=session.skillPointsTotal, spent=session.skillPointsSpent, rem=total-spent;
  const allSkills=Object.entries(SKILLS).flatMap(([ak,skills])=>skills.map(s=>({...s,attrKey:ak})));
  const attrColors={STR:'#dc2626',AGI:'#d97706',WIT:'#7c3aed',EMP:'#15803d'};
  const rows = allSkills.map(s => {
    const cur=eff.skills[s.key]||0;
    const gained=session.skillGains.filter(g=>g.key===s.key).reduce((a,b)=>a+b.amount,0);
    const total_r=cur+gained;
    return `<div class="skill-row">
      <div style="flex:1"><span style="font-weight:600">${s.name}</span>
        <span style="font-size:.7rem;color:${attrColors[s.attrKey]};margin-left:5px;font-weight:700">${s.attrKey}</span>
        ${total_r>=cap?'<span class="tag tag-grey">CAP</span>':''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="sp-btn" onclick="adjSkill('${s.key}',-1)" ${gained>0?'':'disabled'}>−</button>
        <span style="font-weight:700;font-size:1rem;min-width:20px;text-align:center">${total_r}</span>
        <button class="sp-btn" onclick="adjSkill('${s.key}',1)" ${(rem>0&&total_r<cap)?'':'disabled'}>+</button>
        ${gained>0?`<span style="font-size:.72rem;color:var(--safe);font-weight:700">+${gained}</span>`:'<span style="opacity:0">+0</span>'}
      </div>
    </div>`;
  }).join('');
  return `<div class="card">
    <h2>Spend Skill Points</h2>
    <p style="font-size:.88rem;color:var(--muted);margin-bottom:8px">Distribute <strong>${total} Skill Point${total>1?'s':''}</strong>. Skill Cap: <strong>${cap}</strong>.</p>
    <div class="${rem===0?'good-box':'info-box'}" style="margin-bottom:12px">${rem} point${rem!==1?'s':''} remaining${rem===0?' ✓':''}.</div>
    ${rows}
  </div>`;
}
function adjSkill(key,d) {
  const cap=session.lvlData.skillCap;
  const cur=eff.skills[key]||0;
  const gained=session.skillGains.filter(g=>g.key===key).reduce((a,b)=>a+b.amount,0);
  if (d>0) {
    if (session.skillPointsSpent>=session.skillPointsTotal||cur+gained>=cap) return;
    session.skillGains.push({key,amount:1}); session.skillPointsSpent++;
  } else {
    if (gained<=0) return;
    const li=session.skillGains.map((g,i)=>g.key===key?i:-1).filter(i=>i>=0).pop();
    if(li!==undefined){session.skillGains.splice(li,1);session.skillPointsSpent--;}
  }
  renderStep();
}

// ── Attribute ────────────────────────────────────────────────────────
function renderAttribute() {
  const rows = ATTRIBUTES.map(a => {
    const cur=eff.attrs[a.key]||0;
    const sel=session.attrGain?.key===a.key;
    const atMax=cur>=MAX_ATTR_RANK;
    const hpMp=(a.key==='STR'||a.key==='AGI')?'+2 Max HP':'+2 Max MP';
    return `<div class="attr-row" style="border-color:${sel?'var(--accent)':atMax?'#e0e0e0':'var(--rule)'};background:${sel?'var(--accent-lt)':'#f8f7f4'}">
      <div><span style="font-weight:700">${a.name}</span>
        <span style="font-size:.75rem;color:var(--muted);margin-left:8px">${hpMp}</span>
        ${atMax?'<span class="tag tag-grey">MAX</span>':''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:1.15rem;font-weight:700;color:${sel?'var(--accent-dk)':'var(--muted)'}">${cur} → ${cur+(sel?1:0)}</span>
        ${!atMax?`<button class="btn ${sel?'btn-primary':'btn-secondary'}" style="padding:6px 14px;font-size:.82rem" onclick="selAttr('${a.key}')">${sel?'✓ Selected':'Select'}</button>`:'<span style="color:#aaa;font-size:.82rem">At max</span>'}
      </div>
    </div>`;
  }).join('');
  const hpB=session.attrGain&&['STR','AGI'].includes(session.attrGain.key)?2:0;
  const mpB=session.attrGain&&['WIT','EMP'].includes(session.attrGain.key)?2:0;
  return `<div class="card">
    <h2>Raise an Attribute</h2>
    <p style="font-size:.88rem;color:var(--muted);margin-bottom:14px">Choose one Attribute Rank to raise. Maximum rank: <strong>${MAX_ATTR_RANK}</strong>.</p>
    ${rows}
    ${session.attrGain?`<div class="good-box" style="margin-top:10px">✓ ${session.attrGain.name} raised.${hpB?` +${hpB} Max HP.`:''}${mpB?` +${mpB} Max MP.`:''}</div>`
      :'<div class="warn-box" style="margin-top:10px">Choose an Attribute before continuing.</div>'}
  </div>`;
}
function selAttr(key) {
  if ((eff.attrs[key]||0)>=MAX_ATTR_RANK) return;
  session.attrGain = session.attrGain?.key===key ? null : {key, name:ATTRIBUTES.find(a=>a.key===key).name};
  renderStep();
}

// ── Talent ───────────────────────────────────────────────────────────
function renderTalent() {
  const cap=session.lvlData.talentCap;
  const cls=eff.cls;
  const isMartial=(cls==='Fighter'||cls==='Vagabond');
  const isSorcery=(cls==='Magi'||cls==='Druid');
  const isWarlock=eff.specialty==='Warlock';
  const myTalents=(eff.talents||[]).map((t,i)=>t?{name:t,rank:eff.talentRanks?.[i]||1}:null).filter(Boolean);
  const myNames=myTalents.map(t=>t.name);
  const martialPool = isMartial ? MARTIAL_TALENTS : [];
  const sorceryPool = isSorcery ? (isWarlock?WARLOCK_STUDIES:SORCERY_TALENTS_ALL) : [];
  const generalPool = GENERAL_TALENTS;
  const sel=session.talentGain;

  const myHTML = myTalents.length ? myTalents.map(t => {
    const atCap=t.rank>=cap;
    const canRU=!atCap&&(martialPool.includes(t.name)||sorceryPool.includes(t.name)||generalPool.includes(t.name));
    const isSel=sel&&!sel.isNew&&sel.name===t.name;
    return `<div class="opt-chip ${isSel?'sel-green':''} ${!canRU&&!isSel?'dim':''}"
      onclick="${canRU||isSel?`selTalentRU('${t.name.replace(/'/g,"\\'")}')`:''}"
      style="cursor:${canRU?'pointer':'default'}">
      ${t.name} <span style="font-size:.7rem;opacity:.7">R${t.rank}${isSel?'→'+(t.rank+1):''}</span>
      ${atCap?'<span class="tag tag-grey">CAP</span>':canRU&&!isSel?'<span class="tag tag-gold">rank up</span>':''}
    </div>`;
  }).join('') : '<span style="color:var(--muted);font-size:.85rem">No talents yet.</span>';

  const makeNew = (pool,lbl) => {
    if (!pool.length) return '';
    const chips = pool.filter(t=>!myNames.includes(t)).map(t => {
      const isSel=sel?.isNew&&sel.name===t;
      return `<div class="opt-chip ${isSel?'sel':''}" onclick="selTalentNew('${t.replace(/'/g,"\\'")}','${lbl}')">${t}</div>`;
    }).join('');
    return chips ? `<div style="margin-bottom:12px"><h3 style="margin-bottom:6px">${lbl}</h3><div>${chips}</div></div>` : '';
  };

  const descHTML = sel?.name ? (() => {
    const data=TALENT_DATA[sel.name];
    if (!data) return `<p style="color:var(--muted)">See Talents chapter.</p>`;
    const myRank=myTalents.find(t=>t.name===sel.name)?.rank||0;
    const showR=myRank>0?myRank+1:1;
    return `<table class="rtable"><thead><tr><th>Rank</th><th>Description</th></tr></thead><tbody>
      ${data.map((row,i)=>`<tr class="${i+1===showR?'hl':''}"><td>R${i+1}${i+1===showR?' ★':''}</td><td>${row.replace(/<[^>]+>/g,'').replace(/&amp;/g,'&')}</td></tr>`).join('')}
    </tbody></table>`;
  })() : '';

  return `<div class="card">
    <h2>Spend Talent Point</h2>
    <p style="font-size:.88rem;color:var(--muted);margin-bottom:12px">
      Rank up an existing Talent (up to Talent Cap <strong>${cap}</strong>) or learn a new Talent at Rank 1.
    </p>
    <div style="margin-bottom:16px"><h3 style="margin-bottom:8px">Your Talents (tap to rank up)</h3>${myHTML}</div>
    ${makeNew(martialPool,'New Martial Talent')}
    ${makeNew(sorceryPool,isWarlock?'New Study (Patron\'s Gift)':'New Sorcery Talent')}
    ${makeNew(generalPool,'New General Talent')}
    ${sel?`<div class="talent-desc"><div style="font-weight:700;font-size:.95rem;color:var(--cyan);margin-bottom:8px">${sel.name} ${sel.isNew?'<span class="tag tag-gold">New — R1</span>':`<span class="tag tag-green">Rank Up → R${(myTalents.find(t=>t.name===sel.name)?.rank||1)+1}</span>`}</div>${descHTML}</div>
      <div class="good-box" style="margin-top:10px">✓ Selection made.</div>`
      :'<div class="warn-box" style="margin-top:10px">Choose a Talent before continuing.</div>'}
  </div>`;
}
function selTalentRU(name) {
  session.talentGain = session.talentGain?.name===name ? null : {name, isNew:false};
  renderStep();
}
function selTalentNew(name,type) {
  session.talentGain = session.talentGain?.name===name ? null : {name, isNew:true, type};
  renderStep();
}

// ── Summary ──────────────────────────────────────────────────────────
function aggregateGains(gains) {
  const m={};
  gains.forEach(({key,amount})=>{m[key]=(m[key]||0)+amount;});
  return Object.entries(m).map(([key,amount])=>({key,amount}));
}

function buildHistoryEntry() {
  const s=session;
  const hpB=s.attrGain&&['STR','AGI'].includes(s.attrGain.key)?2:0;
  const mpB=s.attrGain&&['WIT','EMP'].includes(s.attrGain.key)?2:0;
  return {
    level:s.targetLevel,
    hpGain:s.hpGain+hpB, mpGain:s.mpGain+mpB,
    skillGains:aggregateGains(s.skillGains),
    attrGain:s.attrGain||null,
    talentGain:s.talentGain||null,
    notes:s.notes,
  };
}

function buildUpdatedChar() {
  const ch=JSON.parse(JSON.stringify(eff));
  applyEntry(ch, buildHistoryEntry());
  ch.specialtyRank=session.lvlData.specialty;
  // Update specialty talent text based on new rank
  if (ch.specialty && SPECIALTY_TALENT_TEXT[ch.specialty]) {
    ch.specialtyTalent = SPECIALTY_TALENT_TEXT[ch.specialty];
  } else if (ch.specialty) {
    ch.specialtyTalent = `${ch.specialty} Specialty Talent (Rank ${session.lvlData.specialty})`;
  }
  return ch;
}

function renderSummaryStep() {
  const s=session, ch=eff, lvl=s.targetLevel;
  const skillChanges=aggregateGains(s.skillGains);
  const allSkills=Object.values(SKILLS).flat();
  const hpB=s.attrGain&&['STR','AGI'].includes(s.attrGain.key)?2:0;
  const mpB=s.attrGain&&['WIT','EMP'].includes(s.attrGain.key)?2:0;
  const newHP=(ch.hpMax||0)+s.hpGain+hpB;
  const newMP=(ch.mpMax||0)+s.mpGain+mpB;

  const changes = [
    ...skillChanges.map(({key,amount})=>{const sk=allSkills.find(s=>s.key===key); return `${sk?.name||key}: ${ch.skills[key]||0} → ${(ch.skills[key]||0)+amount}`;}),
    s.attrGain ? `${s.attrGain.name}: ${ch.attrs[s.attrGain.key]||0} → ${(ch.attrs[s.attrGain.key]||0)+1}${hpB?` (+${hpB} Max HP)`:''}${mpB?` (+${mpB} Max MP)`:''}` : null,
    s.talentGain ? `${s.talentGain.name}: ${s.talentGain.isNew?'New (Rank 1)':'Ranked up'}` : null,
    s.lvlData.special.includes('specialty_rank') ? `Specialty Talent → Rank ${s.lvlData.specialty}` : null,
    s.lvlData.special.includes('talent_cap') ? `Talent Cap → ${s.lvlData.talentCap}` : null,
    s.lvlData.special.includes('skill_cap')  ? `Skill Cap → ${s.lvlData.skillCap}` : null,
  ].filter(Boolean);

  return `<div class="card">
    <h2>Level ${lvl} Complete!</h2>
    <div class="good-box" style="margin-bottom:16px">Review your changes, then save your JSON or export the full PDF sheet.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="stat-card"><div class="val">${newHP}</div><div class="lbl">New Max HP <span style="font-size:.68rem">(was ${ch.hpMax||0})</span></div></div>
      <div class="stat-card"><div class="val">${newMP}</div><div class="lbl">New Max MP <span style="font-size:.68rem">(was ${ch.mpMax||0})</span></div></div>
    </div>
    <ul style="padding-left:18px;font-size:.9rem;line-height:2;margin-bottom:14px">
      ${changes.map(c=>`<li>${c}</li>`).join('')}
    </ul>
    <div style="margin-bottom:14px">
      <label class="field-label">Notes</label>
      <textarea rows="3" placeholder="Notes about this level up..." oninput="session.notes=this.value"
        style="resize:vertical">${s.notes||''}</textarea>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-save" onclick="saveJSON()">💾 Save JSON</button>
      <button class="btn btn-export" onclick="exportPDF()">⬇ Export PDF Sheet</button>
    </div>
    ${session.targetLevel < 20 ? `<button class="btn" onclick="levelUpAgain()"
      style="background:var(--safe);color:#fff;padding:11px 22px;font-size:.95rem;font-weight:700;margin-top:12px;display:block;width:100%;border-radius:7px;border:none;cursor:pointer">
      ⬆ Level Up Again → Level ${session.targetLevel + 1}
    </button>` : '<div class="good-box" style="margin-top:12px">🏆 Level 20 reached — maximum level!</div>'}
    <p style="font-size:.78rem;color:var(--muted);margin-top:10px">
      Save JSON to keep a backup. The PDF is the complete sheet at Level ${lvl}.
    </p>
  </div>`;
}

// ── Navigation ───────────────────────────────────────────────────────
function nextStep() {
  const step=STEPS[currentStep];
  if (step==='summary') { exportPDF(); return; }
  if (step==='status'&&(session.statusPoints-session.hpGain-session.mpGain)!==0) { alert('Allocate all '+session.statusPoints+' Status Points first.'); return; }
  if (step==='skills'&&session.skillPointsSpent<session.skillPointsTotal) { alert('Spend all '+session.skillPointsTotal+' Skill Points first.'); return; }
  if (step==='attribute'&&!session.attrGain) { alert('Choose an Attribute to raise.'); return; }
  if (step==='talent'&&!session.talentGain) { alert('Choose a Talent first.'); return; }
  currentStep++;
  renderProgress();
  renderStep();
  window.scrollTo({top:0,behavior:'smooth'});
}
function prevStep() {
  if (currentStep>0) { currentStep--; renderProgress(); renderStep(); }
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Save JSON ────────────────────────────────────────────────────────
function saveJSON() {
  const updCh=buildUpdatedChar();
  const data={...baseChar, ch:updCh, levelHistory:[...(baseChar.levelHistory||[]),buildHistoryEntry()], savedAt:new Date().toLocaleString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(updCh.name||'character')+'_level'+session.targetLevel+'.json';
  a.click();
}

const winansi = s => String(s||'').replace(/[\u0080-\uffff]/g,'');
function stripHtml(s){return String(s||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').trim();}
function buildDicePoolForChar(attrKey,skillKey,modStr,ch){
  let attrVal=0;
  if(attrKey==='STR_AGI_HIGH'){const s=ch.attrs.STR||0,a=ch.attrs.AGI||0;attrVal=(s>=a)?s:a;}
  else if(attrKey==='STR') attrVal=ch.attrs.STR||0;
  else if(attrKey==='AGI') attrVal=ch.attrs.AGI||0;
  const skillVal=ch.skills[skillKey]||0;
  let d8s=0,d6s=0;
  if(attrVal===0&&skillVal===0){d6s=1;}
  else{const high=Math.max(attrVal,skillVal),low=Math.min(attrVal,skillVal);d8s=low;d6s=high-low;}
  if(modStr==='+1') d6s+=1;
  const p=[];if(d8s>0)p.push(d8s+'d8');if(d6s>0)p.push(d6s+'d6');return p.length?p.join('+'):'1d6';
}

async function exportPDF(){
  const btn=document.getElementById('btn-next');
  const origText=btn.textContent;
  btn.textContent='Generating PDF...';btn.disabled=true;
  try{
    const ch=buildUpdatedChar();
    // Try relative path first (works locally and on GitHub Pages)
    let pdfBytes;
    try{pdfBytes=await fetch('Character_Sheet_Form_Fill.pdf').then(r=>{if(!r.ok)throw new Error();return r.arrayBuffer();});}
    catch(e){pdfBytes=await fetch('./Character_Sheet_Form_Fill.pdf').then(r=>r.arrayBuffer());}
    const {PDFDocument}=PDFLib;
    const pdf=await PDFDocument.load(pdfBytes,{ignoreEncryption:true});
    const form=pdf.getForm();
    const set=(f,v)=>{try{form.getTextField(f).setText(winansi(v));}catch(e){}};
    const setSmall=(f,v,sz)=>{try{const fld=form.getTextField(f);try{fld.setFontSize(sz||7);}catch(fe){try{const ws=fld.acroField.getWidgets();const da='/Helvetica '+(sz||7)+' Tf 0 g';ws.forEach(w=>w.setDefaultAppearance(da));fld.acroField.setDefaultAppearance(da);}catch(da){}}fld.setText(stripHtml(winansi(v)));}catch(e){}};

    const lg=(window.LINEAGES||[]).find(l=>l.name===ch.lineage)||{};
    const allSkills={};Object.values(SKILLS).flat().forEach(s=>{allSkills[s.key]=ch.skills[s.key]||0;});

    set('Character Name',ch.name||'');set('JOB',ch.cls||'');set('SPECIALTY',ch.specialty||'');
    set('LINEAGE',ch.mixedLineage&&ch.mixedLineages?.length===2?ch.mixedLineages.join(' / '):(ch.lineage||''));
    set('LEVEL',ch.level||1);set('XP',0);
    const effSize=ch.sizeChoice&&(ch.lineage==='Humans'||ch.lineage==='Ozonian')?ch.sizeChoice:(lg.size||'');
    set('SIZE',effSize);set('SPEED',lg.speed?lg.speed+' ft':'30 ft');
    const baseSpeakLangs=lg.langs?.speak||[];const baseReadLangs=lg.langs?.read||[];
    const extraSpeak=ch.extraLanguagePicks?.filter(l=>l)||[];const extraRead=ch.extraLanguageReads?.filter(l=>l)||[];
    set('LANGUAGES',[...new Set([...baseSpeakLangs,...extraSpeak])].join(', '));
    set('LANGUAGES read',[...new Set([...baseReadLangs,...extraRead])].join(', '));
    set('STRENGTH',ch.attrs.STR||0);set('AGILITY',ch.attrs.AGI||0);set('WITS',ch.attrs.WIT||0);set('EMPATHY',ch.attrs.EMP||0);
    ['Brawl','Might','Endure','Intimidate','Move','Hide','Finesse','Shoot','Analyze','Scout','Insight','Survival','Medical','Manipulate','Perform','Tame']
    .forEach(k=>set(k,allSkills[k]||0));
    const dpVal=ch.dp||0;
    set('HP max',ch.hpMax||0);set('HP cur',ch.hpMax||0);
    set('MP max',ch.mpMax||0);set('MP Cur',ch.mpMax||0);
    set('DP max',dpVal);set('DP Cur',dpVal);
    set('Sorce Max',ch.mpMax||0);set('Sorce Cur',ch.mpMax||0);
    set('Recovery Max',ch.level||1);set('Recovery Cur',ch.level||1);
    if(ch.cls==='Magi') set('spell att','Wits');
    if(ch.cls==='Druid') set('spell att','Empathy');
    const specRank=ch.specialtyRank||1;
    let specText=ch.specialtyTalent||'';
    if(!specText&&ch.specialty) specText=ch.specialty+' Specialty Talent (Rank '+specRank+')';
    const allTalents=[specText,...(ch.talents||[]).filter(t=>t)];
    allTalents.slice(0,10).forEach((t,i)=>{
      try{setSmall('MP Talent name '+(i+1),t,11);}catch(e){}
      const rank=i===0?specRank:(ch.talentRanks?.[i-1]||1);
      try{set('MP Talent rank '+(i+1),String(rank));}catch(e){}
    });
    setSmall('LINEAGE BENEFITS',ch.lineageBenefits||'',11);
    setSmall('SPECIALTY TALENT',specText,9);
    const talentFields=['TALENT','TALENT_2','TALENT_3','TALENT_4','TALENT_5','TALENT_6','TALENT_7','TALENT_8','TALENT_9'];
    (ch.talents||[]).filter(t=>t).slice(0,9).forEach((t,i)=>{
      const tRank=ch.talentRanks?.[i]||1;
      const tData=TALENT_DATA[t];
      if(tData&&tData[tRank-1]){
        const rankText=tData[tRank-1].replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ');
        const fontSize=i===0?6:(rankText.length>120?7:9);
        setSmall(talentFields[i],t+' (Rank '+tRank+')\n'+rankText,fontSize);
      }else{setSmall(talentFields[i],t+(tRank>1?' (Rank '+tRank+')':''),11);}
    });
    set('CHARACTER NOTES',ch.notes||'');
    set('Silver',ch.currency?.silver||0);set('Gold',ch.currency?.gold||0);set('Pluther',ch.currency?.pluther||0);
    const ARMOR_NAMES_PDF=['quilted vest','layered plate','light leather','reinforced tunic','brigandine'];
    const gearVals=Object.values(ch.gearSelections||{}).filter(v=>v).length>0?Object.values(ch.gearSelections||{}).filter(v=>v):(ch.equip||[]).filter(v=>v);
    const armorItem=gearVals.find(v=>ARMOR_NAMES_PDF.some(a=>v.toLowerCase().includes(a)))||'';
    const BELT_KW=['short sword','hand axe','hammer','long sword','battle axe','flintlock pistol','bullet pouch','limb wraps','bolt pouch','dagger','arcane wand','shortsword','pistol'];
    const BACK_KW=['small shield','mace','light crossbow','crossbow','short bow','shortbow','arrow quiver','arcane staff','arcane instrument','longsword'];
    const isKit=v=>['alchemy kit','engineer tool kit'].some(k=>v.toLowerCase().includes(k));
    const slotOf=v=>{const lv=v.toLowerCase();if(BACK_KW.some(k=>lv.includes(k)))return 'back';if(BELT_KW.some(k=>lv.includes(k)))return 'belt';return 'belt';};
    const kitItem=gearVals.find(isKit)||'';
    const gearItems=gearVals.filter(v=>!ARMOR_NAMES_PDF.some(a=>v.toLowerCase().includes(a))&&!isKit(v));
    const expanded=[];gearItems.forEach(v=>{expanded.push(v);if(v.toLowerCase()==='shortbow and arrow quiver'){expanded[expanded.length-1]='Shortbow';expanded.push('Arrow Quiver');}});
    const backSlots=expanded.filter(v=>slotOf(v)==='back').slice(0,2);
    const beltSlots=expanded.filter(v=>slotOf(v)==='belt').slice(0,2);
    set('Equipment 1',armorItem);set('Equipment 2',backSlots[0]||'');set('Equipment 3',backSlots[1]||'');
    set('Equipment 4',beltSlots[0]||'');set('Equipment 5',beltSlots[1]||'');set('Equipment 6',kitItem);
    setSmall('Back and kit features','Backpack',14);setSmall('carry Cur','8',14);
    set('Upbringing',ch.lifepath?.upbringing||ch.lifepathCustom?.upbringing||'');
    set('Culture',ch.lifepath?.culture||ch.lifepathCustom?.culture||'');
    set('Personality',ch.lifepath?.personality||ch.lifepathCustom?.personality||'');
    set('Value Most',ch.lifepath?.value||ch.lifepathCustom?.value||'');
    set('What Upsets You',ch.lifepath?.upset||ch.lifepathCustom?.upset||'');
    set('How you approach Decisions',ch.lifepath?.decisions||ch.lifepathCustom?.decisions||'');
    set('How you view others',ch.lifepath?.viewOfOthers||ch.lifepathCustom?.viewOfOthers||'');
    (ch.notable||[]).slice(0,10).forEach((n,i)=>set('Notable Char '+(i+1),n||''));
    const seenW=new Set();const weapEntries=[];
    gearVals.forEach(item=>{
      const wE=WEAPON_DATA[item];
      const wT=WEAPON_DATA[item.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ')];
      const wL=Object.keys(WEAPON_DATA).find(k=>k.toLowerCase()===item.toLowerCase());
      const w=wE||wT||(wL?WEAPON_DATA[wL]:null);
      if(w){const nm=w.name||item;if(seenW.has(nm.toLowerCase()))return;seenW.add(nm.toLowerCase());
        weapEntries.push({name:nm,range:w.range,mod:w.mod,damage:w.damage,pool:buildDicePoolForChar(w.attr,w.skill,w.mod,ch),features:w.features});}
    });
    weapEntries.slice(0,5).forEach((w,i)=>{const n=i+1;
      set('attack name '+n,w.name);set('attack range '+n,w.range);set('attack mod '+n,w.mod);
      set('attack damage '+n,w.damage);set('attack pool '+n,w.pool);set('attack features '+n,w.features);
    });
    const studyTalent=(ch.talents||[]).find(t=>t&&t.startsWith('Study of'));
    if(studyTalent&&STUDY_SPELLS[studyTalent]){
      const study=STUDY_SPELLS[studyTalent];
      (study.rank0||[]).slice(0,7).forEach((sp,i)=>{const n=i+1;
        set('r0sname'+n,winansi(sp.name));set('r0sstudy'+n,winansi(sp.study));
        set('r0srange'+n,winansi(sp.range));set('r0sct'+n,winansi(sp.ct));
        set('r0sshape'+n,winansi(sp.shape));set('r0sduration'+n,winansi(sp.dur));
        setSmall('rank0spower'+n,sp.pl==='-'?'':sp.pl,9);
        if(sp.focus){try{form.getCheckBox('rk0f'+n).check();}catch(e){}}
      });
      (study.rank1||[]).slice(0,7).forEach((sp,i)=>{const n=i+1;
        set('r1sname'+n,winansi(sp.name));set('r1sstudy'+n,winansi(sp.study));
        set('r1srange'+n,winansi(sp.range));set('r1sct'+n,winansi(sp.ct));
        set('r1sshape'+n,winansi(sp.shape));set('r1sduration'+n,winansi(sp.dur));
        setSmall('rank1spower'+n,sp.pl==='-'?'':sp.pl,9);
        if(sp.focus){try{form.getCheckBox('rk1f'+n).check();}catch(e){}}
      });
    }
    const filledBytes=await pdf.save();
    const blob=new Blob([filledBytes],{type:'application/pdf'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=winansi(ch.name||'character')+'_level'+(ch.level||1)+'_sheet.pdf';a.click();
  }catch(err){
    alert('PDF generation failed: '+err.message+'\nMake sure Character_Sheet_Form_Fill.pdf is in the same folder.');
  }finally{btn.textContent=origText;btn.disabled=false;}
}

function saveJSON() {
  const updCh=buildUpdatedChar();
  const data={...baseChar, ch:updCh, levelHistory:[...(baseChar.levelHistory||[]),buildHistoryEntry()], savedAt:new Date().toLocaleString()};
  try { localStorage.setItem('rol_character', JSON.stringify(data)); } catch(e) {}
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(updCh.name||'character')+'_level'+session.targetLevel+'.json';
  a.click();
}

function levelUpAgain() {
  // Build the updated character and restart the wizard in place — no reload needed
  const updCh = buildUpdatedChar();
  const data = {
    ...baseChar,
    ch: updCh,
    levelHistory: [...(baseChar.levelHistory||[]), buildHistoryEntry()],
    savedAt: new Date().toLocaleString(),
  };
  try { localStorage.setItem('rol_character', JSON.stringify(data)); } catch(e) {}
  // Re-initialise directly
  baseChar = data;
  initEffective();
  initSession();
  buildSteps();
  currentStep = 0;
  renderBanner();
  renderProgress();
  renderStep();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── LocalStorage auto-detection on page load ────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  try {
    const saved = localStorage.getItem('rol_character');
    if (saved) {
      const data = JSON.parse(saved);
      const ch = data.ch || data;
      if (ch && ch.cls) {
        const lvl = ch.level || 1;
        if (lvl >= 20) {
          // Max level — just show the notice panel
          const panel = document.getElementById('ls-panel');
          const nameEl = document.getElementById('ls-char-name');
          if (panel) panel.style.display = 'block';
          if (nameEl) nameEl.textContent = (ch.name||'Unnamed Hero') + ' — Level 20 (max level reached)';
          const btn = panel && panel.querySelector('.btn-primary');
          if (btn) btn.disabled = true;
        } else {
          // Auto-start the wizard immediately — no click needed
          baseChar = data;
          initEffective();
          initSession();
          buildSteps();
          document.getElementById('load-panel').style.display = 'none';
          document.getElementById('wizard').style.display = 'block';
          renderBanner();
          renderProgress();
          renderStep();
        }
      }
    }
  } catch(e) {}
});

function loadFromLocalStorage() {
  try {
    const saved = localStorage.getItem('rol_character');
    if (!saved) return;
    const data = JSON.parse(saved);
    const ch = data.ch || data;
    if (!ch || !ch.cls) throw new Error('Invalid character data.');
    if ((ch.level||1) >= 20) { alert('This character is already at maximum level (20).'); return; }
    baseChar = data;
    initEffective();
    initSession();
    buildSteps();
    document.getElementById('load-panel').style.display = 'none';
    document.getElementById('wizard').style.display = 'block';
    renderBanner();
    renderProgress();
    renderStep();
  } catch(err) {
    alert('Error loading character: ' + err.message);
  }
}

</script>
<script>

(function(){
  const canvas = document.getElementById('starfield');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let stars = [];
  const COUNT = 220;
  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function init(){
    stars = [];
    for (let i = 0; i < COUNT; i++) {
      stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height,
        r:Math.random()*1.4+0.2, alpha:Math.random()*0.6+0.2,
        speed:Math.random()*0.015+0.003, phase:Math.random()*Math.PI*2});
    }
  }
  function draw(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (const s of stars){
      const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(200,220,255,' + a + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', ()=>{ resize(); init(); });
  resize(); init(); requestAnimationFrame(draw);
})();

</script>
