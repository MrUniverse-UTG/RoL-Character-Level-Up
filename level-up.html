<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Realms of Legacy — Level Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>

:root {
  --void:#04060f; --deep:#080d1c; --mid:#0d1630; --surface:#111b3a;
  --border:rgba(100,160,255,0.15); --border-gold:rgba(201,168,76,0.25);
  --cyan:#4fc3f7; --cyan-glow:rgba(79,195,247,0.3);
  --gold:#c9a84c; --gold-pale:#e8d5a3; --gold-glow:rgba(201,168,76,0.3);
  --text:#c8d8f0; --text-dim:#7a90b8; --white:#eef2ff;
  --ink:#c8d8f0; --paper:#04060f; --muted:#7a90b8; --rule:rgba(100,160,255,0.12);
  --accent:#4fc3f7; --accent-lt:rgba(79,195,247,0.08); --accent-dk:#82d8f8;
  --gold-lt:rgba(201,168,76,0.1);
  --danger:#f87171; --safe:#4ade80;
  --head-bg:rgba(4,6,15,0.95); --head-txt:#e8d5a3;
  --card-bg:rgba(17,27,58,0.8); --card-border:rgba(100,160,255,0.15);
  --step-active:#4fc3f7; --step-done:#4ade80; --step-todo:rgba(100,160,255,0.2);
  --r:6px;
  --font-display:'Cinzel Decorative',serif;
  --font-heading:'Cinzel',serif;
  --font-body:'Crimson Pro',Georgia,serif;
  --font-ui:'DM Sans',system-ui,sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);font-size:1.05rem;line-height:1.7;color:var(--text);background:var(--void);min-height:100vh;overflow-x:hidden}

/* Starfield */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Header */
#topbar{background:rgba(4,6,15,0.95);backdrop-filter:blur(16px);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border-gold)}
#topbar h1{font-family:var(--font-display);font-size:1.1rem;color:var(--gold);font-weight:700;flex:1;letter-spacing:.04em;text-shadow:0 0 20px var(--gold-glow)}
#topbar .subtitle{font-family:var(--font-heading);font-size:.72rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
#topbar a{color:var(--text-dim);text-decoration:none;font-family:var(--font-heading);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:3px;border:1px solid transparent;transition:all .2s}
#topbar a:hover{color:var(--cyan);border-color:rgba(79,195,247,0.3);background:rgba(79,195,247,0.06)}

/* Progress bar */
#progress-wrap{background:rgba(8,13,28,0.9);border-bottom:1px solid var(--border);padding:14px 20px;overflow-x:auto;position:relative;z-index:1}
#progress{display:flex;gap:0;min-width:600px;max-width:900px;margin:0 auto}
.prog-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer}
.prog-step::before{content:'';position:absolute;top:13px;left:calc(-50% + 18px);right:calc(50% + 18px);height:2px;background:var(--step-todo);z-index:0}
.prog-step:first-child::before{display:none}
.prog-step.done::before{background:var(--step-done)}
.prog-step.active::before{background:var(--step-active)}
.prog-dot{width:28px;height:28px;border-radius:50%;background:rgba(100,160,255,0.15);border:1px solid var(--border);color:var(--text-dim);display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);font-size:.75rem;font-weight:700;position:relative;z-index:1;transition:all .2s}
.prog-step.done .prog-dot{background:rgba(74,222,128,0.15);border-color:var(--safe);color:var(--safe)}
.prog-step.active .prog-dot{background:rgba(79,195,247,0.15);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px var(--cyan-glow)}
.prog-step.clickable:hover .prog-dot{filter:brightness(1.3)}
.prog-label{font-family:var(--font-heading);font-size:.62rem;font-weight:600;color:var(--text-dim);margin-top:5px;text-align:center;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.prog-step.active .prog-label{color:var(--cyan)}
.prog-step.done .prog-label{color:var(--safe)}

/* Main layout */
#main{max-width:860px;margin:0 auto;padding:28px 20px 80px;position:relative;z-index:1}

/* Step panels */
.step-panel{display:none}
.step-panel.active{display:block}
.step-header{margin-bottom:24px}
.step-header h2{font-family:var(--font-display);font-size:1.6rem;color:var(--gold-pale);margin-bottom:6px;letter-spacing:.02em;text-shadow:0 0 30px var(--gold-glow)}
.step-header p{color:var(--text-dim);font-family:var(--font-ui);font-size:.9rem}

/* Cards / option grids */
.option-grid{display:grid;gap:10px}
.option-grid.cols2{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.option-grid.cols3{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.option-grid.cols4{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}

.option-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .2s;user-select:none;backdrop-filter:blur(4px)}
.option-card:hover{border-color:rgba(79,195,247,0.4);box-shadow:0 0 20px rgba(79,195,247,0.08);transform:translateY(-1px)}
.option-card.selected{border-color:var(--cyan);background:rgba(79,195,247,0.08);box-shadow:0 0 0 1px rgba(79,195,247,0.3),0 4px 20px rgba(79,195,247,0.1)}
.option-card .card-title{font-family:var(--font-heading);font-weight:600;font-size:.9rem;color:var(--gold-pale);margin-bottom:4px;letter-spacing:.04em}
.option-card .card-tag{font-family:var(--font-heading);font-size:.68rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.option-card .card-body{font-size:.92rem;color:var(--text-dim);line-height:1.5}
.option-card.selected .card-body{color:var(--text)}
.option-card .card-stats{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.stat-badge{background:rgba(100,160,255,0.08);border:1px solid var(--border);border-radius:3px;padding:2px 8px;font-family:var(--font-heading);font-size:.7rem;font-weight:600;color:var(--cyan);letter-spacing:.04em}
.stat-badge.bonus{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.3);color:var(--safe)}
.stat-badge.size{background:rgba(201,168,76,0.08);border-color:var(--border-gold);color:var(--gold)}

/* Array picker */
.array-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.array-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:16px;cursor:pointer;text-align:center;transition:all .2s}
.array-card:hover{border-color:rgba(79,195,247,0.4);transform:translateY(-1px)}
.array-card.selected{border-color:var(--cyan);background:rgba(79,195,247,0.08);box-shadow:0 0 20px rgba(79,195,247,0.1)}
.array-nums{display:flex;justify-content:center;gap:10px;margin-bottom:10px}
.array-num{width:44px;height:44px;border-radius:6px;background:rgba(201,168,76,0.1);border:1px solid var(--border-gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-size:1.3rem;font-weight:700}
.array-card .card-hint{font-family:var(--font-ui);font-size:.78rem;color:var(--text-dim)}

/* Attribute assignment */
#attr-assign{margin-top:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.attr-slot{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;backdrop-filter:blur(4px)}
.attr-slot label{font-family:var(--font-heading);font-weight:600;font-size:.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px}
.attr-slot .attr-name{font-family:var(--font-heading);font-weight:700;color:var(--gold-pale);font-size:.95rem;margin-bottom:4px;letter-spacing:.04em}
.attr-slot .attr-desc{font-size:.9rem;color:var(--text-dim);margin-bottom:10px;flex-grow:1}
.rank-select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:4px;font-family:var(--font-ui);font-size:.9rem;background:var(--mid);color:var(--text);cursor:pointer}
.rank-select:focus{outline:none;border-color:var(--cyan)}
.rank-display{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-heading);font-size:1.1rem;font-weight:700;color:var(--gold-pale)}
.rank-display.locked{color:var(--safe)}

/* Skill selector */
.skill-section{margin-bottom:20px}
.skill-section h3{font-family:var(--font-heading);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--cyan);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.skill-chip{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:5px;cursor:pointer;transition:all .15s;font-family:var(--font-ui);font-size:.87rem;font-weight:500;color:var(--text)}
.skill-chip:hover:not(.disabled){border-color:rgba(79,195,247,0.4);background:rgba(79,195,247,0.04)}
.skill-chip.selected{border-color:var(--cyan);background:rgba(79,195,247,0.1);color:var(--white);font-weight:700}
.skill-chip.disabled{opacity:.3;cursor:not-allowed}
.skill-chip.class-bonus{border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.07);color:var(--safe)}
.skill-chip .rank-pip{width:20px;height:20px;border-radius:3px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;color:var(--text-dim)}
.skill-chip.selected .rank-pip{background:var(--cyan);border-color:var(--cyan);color:var(--void)}
.skill-chip.class-bonus .rank-pip{background:var(--safe);border-color:var(--safe);color:var(--void)}

/* Counter */
.selection-counter{font-family:var(--font-ui);font-size:.87rem;color:var(--text-dim);margin-bottom:14px}
.selection-counter strong{color:var(--cyan)}
.selection-counter.done strong{color:var(--safe)}
.selection-counter.over strong{color:var(--danger)}

/* Info / warn box */
.info-box{background:rgba(79,195,247,0.06);border-left:2px solid var(--cyan);border-radius:0 var(--r) var(--r) 0;padding:10px 14px;margin:12px 0;font-family:var(--font-ui);font-size:.88rem;color:var(--cyan)}
.warn-box{background:rgba(201,168,76,0.06);border-left:2px solid var(--gold);border-radius:0 var(--r) var(--r) 0;padding:10px 14px;margin:12px 0;font-family:var(--font-ui);font-size:.88rem;color:var(--gold)}

/* Stat summary */
#stat-summary{position:sticky;bottom:0;background:rgba(4,6,15,0.95);backdrop-filter:blur(16px);border-top:1px solid var(--border-gold);padding:12px 20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;z-index:50}
.stat-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(17,27,58,0.8);border:1px solid var(--border);border-radius:20px;font-family:var(--font-ui);font-size:.82rem}
.stat-pill .label{color:var(--text-dim);font-weight:500}
.stat-pill .val{font-weight:700;color:var(--gold)}

/* Inputs */
textarea, input[type=text], input[type=number], select.full {
  width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:5px;
  font-family:var(--font-ui);font-size:.9rem;color:var(--text);background:var(--mid);
  transition:border-color .15s;resize:vertical
}
textarea:focus, input:focus, select.full:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 1px rgba(79,195,247,0.2)}
.form-row{display:grid;gap:12px;margin-bottom:14px}
.form-row.cols2{grid-template-columns:1fr 1fr}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr}
label.field-label{display:block;font-family:var(--font-heading);font-size:.72rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}

/* Status points */
#status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:12px}
.status-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:14px;text-align:center;backdrop-filter:blur(4px)}
.status-card .status-name{font-family:var(--font-heading);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:6px}
.status-card .status-val{font-size:2.2rem;font-weight:700;color:var(--gold-pale);font-family:var(--font-display);line-height:1}
.status-card .status-formula{font-family:var(--font-ui);font-size:.7rem;color:var(--text-dim);margin-top:4px}
.status-card.hp{border-color:rgba(248,113,113,0.25)}.status-card.hp .status-val{color:var(--danger)}
.status-card.mp{border-color:rgba(79,195,247,0.25)}.status-card.mp .status-val{color:var(--cyan)}
.status-card.dp{border-color:rgba(74,222,128,0.25)}.status-card.dp .status-val{color:var(--safe)}
.status-card.sp{border-color:rgba(192,132,252,0.25)}.status-card.sp .status-val{color:#c084fc}

/* Nav buttons */
#nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.btn{padding:10px 26px;border:none;border-radius:3px;font-family:var(--font-heading);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.1em;text-transform:uppercase}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--gold);color:var(--void);border:1px solid var(--gold)}
.btn-primary:hover{background:var(--gold-pale);box-shadow:0 0 20px var(--gold-glow)}
.btn-secondary{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-secondary:hover{color:var(--cyan);border-color:rgba(79,195,247,0.4);background:rgba(79,195,247,0.05)}
.btn-export{background:var(--gold);color:var(--void);padding:13px 32px;font-size:.85rem;border:1px solid var(--gold)}
.btn-export:hover{background:var(--gold-pale);box-shadow:0 0 25px var(--gold-glow)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* Lifepath tables */
.lp-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:.9rem}
.lp-table th{background:rgba(17,27,58,0.9);color:var(--gold);padding:7px 12px;text-align:left;font-family:var(--font-heading);font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border-gold)}
.lp-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text)}
.lp-table tr:last-child td{border-bottom:none}
.lp-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.lp-table .roll{font-weight:700;color:var(--gold);white-space:nowrap;font-family:var(--font-heading)}
.lp-table .opt-name{font-weight:700;font-family:var(--font-heading);color:var(--gold-pale)}
.lp-table tr.lp-selected td{background:rgba(79,195,247,0.06)}
.lp-table tr{cursor:pointer}
.lp-table tr:hover td{background:rgba(79,195,247,0.04)}
.lp-selected-badge{display:inline-block;background:var(--cyan);color:var(--void);border-radius:3px;padding:1px 8px;font-family:var(--font-heading);font-size:.68rem;font-weight:700;margin-left:8px}

/* Summary */
#summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
.summary-block{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:16px;backdrop-filter:blur(4px)}
.summary-block h3{font-family:var(--font-heading);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:12px}
.summary-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.9rem}
.summary-row:last-child{border-bottom:none}
.summary-row .s-label{color:var(--text-dim);font-family:var(--font-ui);font-size:.82rem}
.summary-row .s-val{font-weight:700;color:var(--gold-pale);font-family:var(--font-heading);font-size:.85rem}

/* Validation */
.validation-msg{font-family:var(--font-ui);font-size:.82rem;padding:8px 12px;border-radius:5px;margin-top:8px}
.validation-msg.error{background:rgba(248,113,113,0.08);color:var(--danger);border:1px solid rgba(248,113,113,0.2)}
.validation-msg.ok{background:rgba(74,222,128,0.08);color:var(--safe);border:1px solid rgba(74,222,128,0.2)}

/* Save indicator */
#save-indicator{font-family:var(--font-ui);font-size:.78rem;color:var(--safe);margin-left:8px}

/* Lineage detail */
#lineage-detail{margin-top:16px;padding:16px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r)}

/* Responsive */
@media(max-width:640px){
  #summary-grid{grid-template-columns:1fr}
  .form-row.cols2,.form-row.cols3{grid-template-columns:1fr}
  .array-grid{grid-template-columns:1fr 1fr}
  #attr-assign{grid-template-columns:1fr 1fr}
}

/* ── Level-Up specific styles ── */
#app{max-width:860px;margin:0 auto;padding:20px;position:relative;z-index:1}
.header{text-align:center;padding:28px 0 20px;border-bottom:1px solid var(--border-gold);margin-bottom:24px}
.header h1{font-family:var(--font-display);font-size:1.7rem;color:var(--gold-pale);letter-spacing:.03em;text-shadow:0 0 30px var(--gold-glow)}
.header p{color:var(--text-dim);font-size:.9rem;margin-top:6px;font-family:var(--font-ui)}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:20px;margin-bottom:16px;backdrop-filter:blur(4px)}
.card h2{font-family:var(--font-heading);font-size:1rem;font-weight:700;color:var(--gold-pale);margin-bottom:12px;letter-spacing:.04em}
.card h3{font-family:var(--font-heading);font-size:.78rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.prog-bar{display:flex;gap:4px;margin-bottom:20px}
.prog-step{flex:1;height:6px;border-radius:3px;background:var(--step-todo);transition:background .2s}
.prog-step.done{background:var(--step-done)}.prog-step.active{background:var(--step-active)}
.info-box{background:rgba(79,195,247,0.06);border-left:2px solid var(--cyan);border-radius:0 var(--r) var(--r) 0;padding:10px 14px;margin:8px 0;font-family:var(--font-ui);font-size:.88rem;color:var(--cyan)}
.warn-box{background:rgba(201,168,76,0.06);border-left:2px solid var(--gold);border-radius:0 var(--r) var(--r) 0;padding:10px 14px;margin:8px 0;font-family:var(--font-ui);font-size:.88rem;color:var(--gold)}
.good-box{background:rgba(74,222,128,0.06);border-left:2px solid var(--safe);border-radius:0 var(--r) var(--r) 0;padding:10px 14px;margin:8px 0;font-family:var(--font-ui);font-size:.88rem;color:var(--safe)}
.btn{display:inline-block;padding:10px 22px;border-radius:3px;font-family:var(--font-heading);font-weight:600;font-size:.78rem;cursor:pointer;border:none;transition:all .2s;letter-spacing:.08em;text-transform:uppercase}
.btn-primary{background:var(--gold);color:var(--void);border:1px solid var(--gold)}.btn-primary:hover{background:var(--gold-pale);box-shadow:0 0 20px var(--gold-glow)}
.btn-primary:disabled,.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-secondary{background:transparent;color:var(--text-dim);border:1px solid var(--border)}.btn-secondary:hover{color:var(--cyan);border-color:rgba(79,195,247,0.4);background:rgba(79,195,247,0.05)}
.btn-export{background:var(--gold);color:var(--void);font-size:.85rem;padding:13px 32px;border:1px solid var(--gold)}.btn-export:hover{background:var(--gold-pale);box-shadow:0 0 25px var(--gold-glow)}
.btn-save{background:rgba(79,195,247,0.1);color:var(--cyan);border:1px solid rgba(79,195,247,0.3);padding:11px 24px}
.btn-save:hover{background:rgba(79,195,247,0.15)}
.stat-badge{display:inline-block;padding:3px 9px;border-radius:3px;font-family:var(--font-heading);font-size:.7rem;font-weight:700;background:rgba(100,160,255,0.1);color:var(--cyan);border:1px solid var(--border);letter-spacing:.04em;margin:2px}
.stat-badge.gold{background:rgba(201,168,76,0.1);color:var(--gold);border-color:var(--border-gold)}
.opt-chip{display:inline-block;padding:6px 14px;border-radius:20px;font-family:var(--font-ui);font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);margin:3px;transition:all .15s}
.opt-chip:hover{border-color:rgba(79,195,247,0.4)}
.opt-chip.sel{border-color:var(--cyan);background:rgba(79,195,247,0.12);color:var(--white)}
.opt-chip.sel-green{border-color:rgba(74,222,128,0.5);background:rgba(74,222,128,0.1);color:var(--safe)}
.opt-chip.dim{opacity:.3;cursor:default}
.skill-row{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-radius:6px;margin-bottom:4px;background:var(--card-bg);border:1px solid var(--card-border)}
.attr-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:6px;margin-bottom:6px;border:1px solid var(--card-border);background:var(--card-bg)}
.sp-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);font-size:1rem;cursor:pointer;font-weight:700;line-height:1;color:var(--text)}
.sp-btn:hover:not(:disabled){border-color:var(--cyan);color:var(--cyan)}
.sp-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.stat-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:12px;text-align:center}
.stat-card .val{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--gold-pale)}
.stat-card .lbl{font-family:var(--font-heading);font-size:.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em}
.tag{display:inline-block;font-family:var(--font-heading);font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:5px;vertical-align:middle;letter-spacing:.06em}
.tag-gold{background:var(--gold);color:var(--void)}
.tag-grey{background:rgba(255,255,255,0.15);color:var(--text-dim)}
.tag-green{background:var(--safe);color:var(--void)}
.talent-desc{background:rgba(201,168,76,0.06);border:1px solid var(--border-gold);border-radius:var(--r);padding:12px;margin-top:10px;font-size:.85rem;color:var(--text)}
table.rtable{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px}
table.rtable th{background:rgba(8,13,28,0.9);color:var(--gold);padding:5px 10px;text-align:left;font-family:var(--font-heading);font-size:.7rem;letter-spacing:.06em;text-transform:uppercase}
table.rtable td{padding:5px 10px;border-bottom:1px solid var(--border);color:var(--text)}
table.rtable tr.hl td{background:rgba(201,168,76,0.12);font-weight:700}
#load-panel{text-align:center;padding:40px 20px;position:relative;z-index:1}
.file-drop{border:2px dashed var(--border-gold);border-radius:var(--r);padding:36px 20px;cursor:pointer;transition:all .2s;background:var(--card-bg)}
.file-drop:hover{border-color:var(--gold);box-shadow:0 0 20px var(--gold-glow)}
.file-drop input{display:none}
input[type=text],input[type=number],select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:5px;font-family:var(--font-ui);font-size:.9rem;background:var(--mid);color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 1px rgba(79,195,247,0.2)}
label.field-label,.field-label{display:block;font-family:var(--font-heading);font-size:.72rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
* { font-variant-ligatures: no-common-ligatures; }

</div>

async function exportPDF() {
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.textContent = 'Generating PDF...';
  try {
    // Fetch the PDF template
    const pdfBytes = await fetch('Character_Sheet_Form_Fill.pdf').then(r => r.arrayBuffer());
    const { PDFDocument } = PDFLib;
    const pdf = await PDFDocument.load(pdfBytes, { ignoreEncryption: true });
    const form = pdf.getForm();

    // For mixed lineage, pull stats from the Features lineage
    const featuresLineageName = ch.mixedLineage ? (ch.mixedAssignment.features || ch.mixedLineages[0]) : ch.lineage;
    const lg = LINEAGES.find(l=>l.name===featuresLineageName) || {};
    const allSkills = {};
    for (const skills of Object.values(SKILLS)) skills.forEach(s => { allSkills[s.key] = ch.skills[s.key]||0; });

    // Helper — sanitize to WinAnsi-safe ASCII
    const winansi = s => String(s||'').replace(/[\u0080-\uffff]/g, c => {
      const map = {'\u2264':'<=','\u2265':'>=','\u2014':'-','\u2013':'-','\u2500':'-',
                   '\u2019':"'",'\u2018':"'",'\u201c':'"','\u201d':'"','\u2026':'...',
                   '\u00e9':'e','\u00e8':'e','\u00e0':'a','\u00e2':'a','\u00ea':'e',
                   '\u00ee':'i','\u00f4':'o','\u00fb':'u','\u00fc':'u','\u00e7':'c'};
      return map[c] || '';
    });
    const set = (fieldName, val) => {
      try { form.getTextField(fieldName).setText(winansi(val)); } catch(e) {}
    };
    const setCheck = (fieldName, checked) => {
      try {
        const f = form.getCheckBox(fieldName);
        if (checked) f.check(); else f.uncheck();
      } catch(e) {
        try {
          const f = form.getButton(fieldName);
          f.setImage && f.setImage('');
        } catch(e2) {}
      }
    };

    // Page 1 - Identity
    set('Character Name', ch.name);
    set('JOB', ch.cls);
    // Spellcasting attribute: Wits for Magi, Empathy for Druid
    const clsData = CLASSES.find(c => c.name === ch.cls);
    if (clsData?.spellcasting) {
      set('spell att', clsData.spellcasting);
    }
    set('SPECIALTY', ch.specialty);
    // Lineage name — show both if Mixed
    const lineagePDFName = ch.mixedLineage && ch.mixedLineages.length === 2
      ? ch.mixedLineages.join(' / ')
      : (ch.lineage || '');
    set('LINEAGE', lineagePDFName);
    set('LEVEL', ch.level||1);
    set('XP', 0);
    // If mixed lineage with Fueglin Small and Nimble, force Small
    // Undead: size comes from the Repurposed lineage (not Undead's own 'Varies')
    let effectiveSize = lg.size || '';
    if (ch.mixedForcedSmall) {
      effectiveSize = 'Small';
    } else if (featuresLineageName === 'Undead' && ch.undeadRepurposedLineage) {
      const repLgSize = LINEAGES.find(l => l.name === ch.undeadRepurposedLineage);
      const repSize = repLgSize?.size || '';
      // Human/Ozonian use sizeChoice; others use their defined size
      effectiveSize = (ch.undeadRepurposedLineage === 'Humans' || ch.undeadRepurposedLineage === 'Ozonian')
        ? (ch.sizeChoice || repSize)
        : repSize;
    } else if (ch.sizeChoice && (featuresLineageName === 'Humans' || featuresLineageName === 'Ozonian')) {
      effectiveSize = ch.sizeChoice;
    }
    set('SIZE', effectiveSize);
    const baseSpeakLangs = lg.langs?.speak || [];
    const baseReadLangs  = lg.langs?.read  || [];
    const extraSpeak = ch.extraLanguagePicks?.filter(l=>l) || [];
    const extraRead  = ch.extraLanguageReads?.filter(l=>l) || [];
    // Fixed extras (ESL, Beasts)
    const opt = ch.extraLanguage ? EXTRA_LANGUAGE_OPTIONS.find(o=>o.name===ch.extraLanguage) : null;
    const fixedSpeak = opt?.fixed?.speak || [];
    const allSpeak   = [...new Set([...baseSpeakLangs, ...extraSpeak, ...fixedSpeak])];
    const allRead    = [...new Set([...baseReadLangs,  ...extraRead])];
    set('LANGUAGES',      allSpeak.join(', '));
    set('LANGUAGES read', allRead.join(', '));
    set('SPEED', lg.speed ? lg.speed+' ft' : '30 ft');

    // Attributes
    set('STRENGTH',  ch.attrs.STR||0);
    set('AGILITY',   ch.attrs.AGI||0);
    set('WITS',      ch.attrs.WIT||0);
    set('EMPATHY',   ch.attrs.EMP||0);

    // Skills
    set('Brawl',      allSkills.Brawl||0);
    set('Endure',     allSkills.Endure||0);
    set('Intimidate', allSkills.Intimidate||0);
    set('Might',      allSkills.Might||0);
    set('Finesse',    allSkills.Finesse||0);
    set('Hide',       allSkills.Hide||0);
    set('Move',       allSkills.Move||0);
    set('Shoot',      allSkills.Shoot||0);
    set('Analyze',    allSkills.Analyze||0);
    set('Insight',    allSkills.Insight||0);
    set('Scout',      allSkills.Scout||0);
    set('Survival',   allSkills.Survival||0);
    set('Medical',    allSkills.Medical||0);
    set('Manipulate', allSkills.Manipulate||0);
    set('Perform',    allSkills.Perform||0);
    set('Tame',       allSkills.Tame||0);

    // Talents (page 1 table)
    const allTalents = [ch.specialtyTalent, ...ch.talents.filter(t=>t)];
    allTalents.slice(0,10).forEach((t,i)=>{ set(`MP Talent name ${i+1}`, t); set(`MP Talent rank ${i+1}`, '1'); });

    // Status points
    set('HP max', calcHP());  set('HP cur', calcHP());
    set('MP max', calcMP());  set('MP Cur', calcMP());
    const dpVal = ch.dp || 0;
    set('DP max', dpVal);     set('DP Cur', dpVal);
    set('Sorce Max', calcSP()); set('Sorce Cur', calcSP());
    set('Recovery Max', ch.level||1); set('Recovery Cur', ch.level||1);
    set('Specialty max', 0); set('Specialty Cur', 0);

    // CHARACTER NOTES filled below after setSmall is declared

    // Weapons — auto-fill from gear selections
    const gearValsForWeapons = Object.values(ch.gearSelections || {}).filter(v => v);
    const weaponEntries = [];
    const seenWeaponNames = new Set();
    gearValsForWeapons.forEach(item => {
      // Case-insensitive lookup: try exact, then title-case, then by lowercased key match
      const wExact = WEAPON_DATA[item];
      const wTitle = WEAPON_DATA[item.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ')];
      const wLower = Object.keys(WEAPON_DATA).find(k => k.toLowerCase() === item.toLowerCase());
      const w = wExact || wTitle || (wLower ? WEAPON_DATA[wLower] : null);
      if (w) {
        const entryName = w.name || item;
        // Deduplicate: skip if already added (e.g. two Daggers from Sonneteer)
        if (seenWeaponNames.has(entryName.toLowerCase())) return;
        seenWeaponNames.add(entryName.toLowerCase());
        weaponEntries.push({
          name:     entryName,
          range:    w.range,
          mod:      w.mod,
          damage:   w.damage,
          pool:     buildDicePool(w.attr, w.skill, w.mod),
          features: w.features,
        });
      }
    });
    weaponEntries.slice(0, 5).forEach((w, i) => {
      const n = i + 1;
      set('attack name '     + n, w.name);
      set('attack range '    + n, w.range);
      set('attack mod '      + n, w.mod);
      set('attack damage '   + n, w.damage);
      set('attack pool '     + n, w.pool);
      set('attack features ' + n, w.features);
    });

    // Currency
    set('Silver',  ch.currency?.silver||0);
    set('Gold',    ch.currency?.gold||0);
    set('Pluther', ch.currency?.pluther||0);

    // Equipment - smart slot assignment from gear selections
    // PDF fields: Equipment 1=Armor, 2=Back, 3=Back2, 4=Belt, 5=Belt2, 6=Kit
    const ARMOR_NAMES_PDF = ['quilted vest','layered plate','light leather','reinforced tunic','brigandine'];
    // Use gearSelections if populated, otherwise fall back to ch.equip
    const rawGearVals = Object.values(ch.gearSelections || {}).filter(v => v);
    const gearVals = rawGearVals.length > 0 ? rawGearVals : ch.equip.filter(v => v);
    const armorItem  = gearVals.find(v => ARMOR_NAMES_PDF.some(a => v.toLowerCase().includes(a))) || '';
    const nonBackpack = gearVals.filter(v => !ARMOR_NAMES_PDF.some(a => v.toLowerCase().includes(a)) && v.toLowerCase() !== 'backpack');
    const isWeaponItem = v => ['sword','bow','axe','mace','dagger','pistol','wand','staff',
      'crossbow','instrument','hammer','longsword','shortsword','flintlock'].some(w => v.toLowerCase().includes(w));
    const isKitItem = v => ['alchemy kit','engineer tool kit'].some(k => v.toLowerCase().includes(k));

    // Belt items by keyword
    const BELT_KEYWORDS = ['short sword','hand axe','hammer','long sword','battle axe',
      'flintlock pistol','bullet pouch','limb wraps','bolt pouch','dagger','arcane wand',
      'shortsword','pistol'];
    const BACK_KEYWORDS = ['small shield','mace','crossbow','short bow','shortbow',
      'arrow quiver','arcane staff','arcane instrument','longsword','longsword','staff'];

    const slotOf = v => {
      const lv = v.toLowerCase();
      if (BACK_KEYWORDS.some(k => lv.includes(k))) return 'back';
      if (BELT_KEYWORDS.some(k => lv.includes(k))) return 'belt';
      return 'belt'; // default to belt
    };

    const kitItem   = nonBackpack.find(isKitItem) || '';
    const gearItems = nonBackpack.filter(v => !isKitItem(v));

    // Special: if Summoner chose Shortbow, add Arrow Quiver
    const expandedGear = [];
    gearItems.forEach(v => {
      expandedGear.push(v);
      if (v.toLowerCase() === 'shortbow and arrow quiver') { expandedGear[expandedGear.length-1] = 'Shortbow'; expandedGear.push('Arrow Quiver'); }
    });

    const backItems = expandedGear.filter(v => slotOf(v) === 'back');
    const beltItems = expandedGear.filter(v => slotOf(v) === 'belt');

    // Fill Back (Equipment 2-3) and Belt (Equipment 4-5)
    // Overflow rules:
    //   - Belt overflow → Back slots (if space), else Backpack (Gear Name)
    //   - Back overflow → Backpack (Gear Name), NOT Belt
    const backSlots = backItems.slice(0, 2);
    const backOverflow = backItems.slice(2);       // back items that didn't fit → backpack

    const beltSlots = beltItems.slice(0, 2);
    let beltOverflow = beltItems.slice(2);          // belt items that didn't fit

    // Belt overflow can use remaining back slots
    const remainingBackSlots = 2 - backSlots.length;
    if (remainingBackSlots > 0 && beltOverflow.length > 0) {
      const promoted = beltOverflow.splice(0, remainingBackSlots);
      backSlots.push(...promoted);
    }
    // Any remaining belt overflow → backpack
    const backpackItems = [...backOverflow, ...beltOverflow];

    set('Equipment 1', armorItem);
    set('Equipment 2', backSlots[0]||'');
    set('Equipment 3', backSlots[1]||'');
    set('Equipment 4', beltSlots[0]||'');
    set('Equipment 5', beltSlots[1]||'');
    set('Equipment 6', kitItem);  // Kit slot

    // Overflow items → Gear Name slots (backpack inventory on page 2)
    backpackItems.slice(0, 16).forEach((item, i) => set('Gear Name ' + (i+1), item));

    // Page 2 - Lifepath
    set('Upbringing',               ch.lifepath.upbringing||ch.lifepathCustom.upbringing||'');
    set('Culture',                  ch.lifepath.culture||ch.lifepathCustom.culture||'');
    set('Personality',              ch.lifepath.personality||ch.lifepathCustom.personality||'');
    set('Value Most',               ch.lifepath.value||ch.lifepathCustom.value||'');
    set('What Upsets You',          ch.lifepath.upset||ch.lifepathCustom.upset||'');
    set('How you approach Decisions', ch.lifepath.decisions||ch.lifepathCustom.decisions||'');
    set('How you view others',      ch.lifepath.viewOfOthers||ch.lifepathCustom.viewOfOthers||'');

    // Notable characters
    ch.notable.slice(0,10).forEach((n,i)=> set(`Notable Char ${i+1}`, n));

    // Backpack slots (generic)
    const bpItems = ch.equip.slice(6)||[];
    bpItems.slice(0,16).forEach((item,i) => set(`Gear Name ${i+1}`, item||''));

    // Page 3 - Talents (small font size for compact display)
    // Strip HTML tags from a string (for plain text PDF fields)
    const stripHtml = s => String(s||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();

    const setSmall = (fieldName, val, size) => {
      try {
        const field = form.getTextField(fieldName);
        const cleanVal = stripHtml(val);
        // For multiline fields setFontSize may fail - try both approaches
        try {
          field.setFontSize(size || 7);
        } catch(fe) {
          // Multiline field: patch the /DA (Default Appearance) stream directly
          try {
            const widgets = field.acroField.getWidgets();
            const daStr = '/Helvetica ' + (size||7) + ' Tf 0 g';
            widgets.forEach(w => {
              w.setDefaultAppearance(daStr);
            });
            field.acroField.setDefaultAppearance(daStr);
          } catch(da) {}
        }
        field.setText(cleanVal);
      } catch(e) {}
    };
    // Backpack fields (must come after setSmall is declared)
    setSmall('Back and kit features', 'Backpack', 14);
    setSmall('carry Cur', '8', 14);

    setSmall('LINEAGE BENEFITS',  ch.lineageBenefits||'', 11);

    // Sync notes from textarea and fill CHARACTER NOTES field
    const notesEl = document.getElementById('char-notes');
    if (notesEl && notesEl.value) ch.notes = notesEl.value;
    setSmall('CHARACTER NOTES', ch.notes||'', 9);

    // Spells — fill page 4 if a Study of Sorcery talent was selected
    const studyTalent = (ch.talents||[]).find(t => t && t.startsWith('Study of'));
    if (studyTalent && STUDY_SPELLS[studyTalent]) {
      const study = STUDY_SPELLS[studyTalent];
      (study.rank0 || []).slice(0, 7).forEach((sp, i) => {
        const n = i + 1;
        set('r0sname' + n,     winansi(sp.name));
        set('r0sstudy' + n,    winansi(sp.study));
        set('r0srange' + n,    winansi(sp.range));
        set('r0sct' + n,       winansi(sp.ct));
        set('r0sshape' + n,    winansi(sp.shape));
        set('r0sduration' + n, winansi(sp.dur));
        setSmall('rank0spower' + n, sp.pl === '-' ? '' : sp.pl, 9);
        if (sp.focus) { try { form.getCheckBox('rk0f' + n).check(); } catch(e) {} }
      });
      (study.rank1 || []).slice(0, 7).forEach((sp, i) => {
        const n = i + 1;
        set('r1sname' + n,     winansi(sp.name));
        set('r1sstudy' + n,    winansi(sp.study));
        set('r1srange' + n,    winansi(sp.range));
        set('r1sct' + n,       winansi(sp.ct));
        set('r1sshape' + n,    winansi(sp.shape));
        set('r1sduration' + n, winansi(sp.dur));
        setSmall('rank1spower' + n, sp.pl === '-' ? '' : sp.pl, 9);
        if (sp.focus) { try { form.getCheckBox('rk1f' + n).check(); } catch(e) {} }
      });
    }
    setSmall('SPECIALTY TALENT',  ch.specialtyTalent||'', 11);
    const talentFields = ['TALENT','TALENT_2','TALENT_3','TALENT_4','TALENT_5','TALENT_6','TALENT_7','TALENT_8','TALENT_9'];
    ch.talents.filter(t=>t).slice(0,9).forEach((t,i) => {
      if (i === 0 && TALENT_DATA[t] && TALENT_DATA[t][0]) {
        // First talent box: show name + Rank 1 description (strip HTML tags)
        const rank1Text = TALENT_DATA[t][0].replace(/<[^>]+>/g, '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ');
        setSmall(talentFields[i], t + '\nRank 1: ' + rank1Text, 9);
      } else {
        setSmall(talentFields[i], t, 11);
      }
    });
    // Also set small font on talent rank fields in the main table
    for (let ti = 1; ti <= 10; ti++) {
      setSmall('MP Talent name ' + ti, (ch.talents[ti-1]||''), 11);
      setSmall('MP Talent rank ' + ti, ch.talents[ti-1] ? '1' : '', 9);
    }

    const filledBytes = await pdf.save();
    const blob = new Blob([filledBytes], { type:'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (ch.name||'character') + '_RoL_Sheet.pdf';
    a.click();
    URL.revokeObjectURL(url);
  } catch(err) {
    console.error(err);
    alert('PDF generation failed: ' + err.message + '\n\nMake sure Character_Sheet_Form_Fill.pdf is in the same folder as index.html.');
  } finally {
    btn.disabled = false;
    btn.textContent = '⬇ Download Character Sheet PDF';
  }
}

function applyStartingGear() {
  if (!ch.specialty || !STARTING_GEAR[ch.specialty]) return;
  const gear = STARTING_GEAR[ch.specialty];
  // Fill equipment slots (armor is slot 0, others go to belt/back)
  gear.forEach((item, i) => { if (i < 6) ch.equip[i] = item; });
  renderDetailsStep();
}

const ARMOR_DP_MAP = {"Quilted Vest": 10, "Quilted Vest armor": 10, "Layered Plate Armor": 20, "Layered Plate armor": 20, "Light Leather armor": null, "Reinforced Tunic": 12, "Brigandine armor set": 16};

function renderGearStep() {
  const el = document.getElementById('gear-step-content');
  if (!el) return;
  if (!ch.specialty || !GEAR_OPTIONS[ch.specialty]) {
    el.innerHTML = '<div class="warn-box">Please choose a Specialty in Step 5 first.</div>';
    return;
  }
  const slots = GEAR_OPTIONS[ch.specialty];
  const silver = STARTING_GEAR[ch.specialty]?.silver || 20;
  if (!ch.gearSelections) ch.gearSelections = {};
  if (!ch.currency.silver) ch.currency.silver = silver;

  // Detect slot types: armor, weapon, other
  const ARMOR_NAMES = ['Quilted Vest','Quilted Vest armor','Layered Plate Armor','Layered Plate armor',
                       'Light Leather armor','Reinforced Tunic','Brigandine armor set'];
  const isArmorSlot = opts => opts.some(o => ARMOR_NAMES.some(a => o.toLowerCase().includes(a.toLowerCase()) || a.toLowerCase().includes(o.toLowerCase().replace(' armor',''))));
  const isWeaponSlot = (opts, i) => i === 0 || (!isArmorSlot(opts) && opts.some(o =>
    ['sword','bow','axe','mace','dagger','pistol','wand','staff','crossbow','instrument','hammer'].some(w => o.toLowerCase().includes(w))));

  // Auto-initialize all single-option slots
  slots.forEach((options, i) => {
    if (options.length === 1 && !ch.gearSelections[i]) {
      ch.gearSelections[i] = options[0];
      ch.equip[i] = options[0];
    }
    // Also init multi-option slots to first option if not yet set
    if (!ch.gearSelections[i]) {
      ch.gearSelections[i] = options[0];
      ch.equip[i] = options[0];
    }
  });
  // After init, extract DP
  extractNumericDP();

  el.innerHTML = `
    <div class="info-box" style="margin-bottom:20px">
      <strong>${ch.specialty} Starting Gear</strong> - choose one option per row where multiple are offered.
    </div>
    <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px">
      <h3 style="font-family:var(--font-ui);font-size:.95rem;font-weight:700;margin-bottom:14px">Equipment Choices</h3>
      ${slots.map((options, i) => {
        const selected = ch.gearSelections[i] || options[0];
        const armor = isArmorSlot(options);
        const weapon = !armor && isWeaponSlot(options, i);
        const label = armor ? 'Armor' : weapon ? `Weapon${i>0?' / Ammo':''}` : 'Other Gear';
        if (options.length === 1) {
          return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
            <label style="font-family:var(--font-ui);font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;min-width:80px">${label}</label>
            <div style="flex:1;padding:8px 12px;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;font-family:var(--font-ui);font-size:.88rem">${options[0]}</div>
          </div>`;
        }
        return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <label style="font-family:var(--font-ui);font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;min-width:80px">${label}</label>
          <select onchange="updateGearSlot(${i}, this.value)"

function updateGearSlot(idx, value) {
  if (!ch.gearSelections) ch.gearSelections = {};
  // Check armor restrictions
  const isArmor = ['Layered Plate Armor','Layered Plate armor'].includes(value);
  if (isArmor) {
    const str = ch.attrs.STR || 0;
    if (str < 2) {
      alert('Layered Plate Armor requires at least Strength Rank 2. Your current Strength is Rank ' + str + '. Please assign Strength to 2 or higher before selecting this armor.');
      // Revert to previous or first option
      const slots = GEAR_OPTIONS[ch.specialty] || [];
      const options = slots[idx] || [];
      ch.gearSelections[idx] = options.find(o => !['Layered Plate Armor','Layered Plate armor'].includes(o)) || options[0];
      ch.equip[idx] = ch.gearSelections[idx];
      renderGearStep();
      return;
    }
  }
  ch.gearSelections[idx] = value;
  ch.equip[idx] = value;
  // Auto-calculate DP if armor changed
  const dpText = getArmorDP();
  const dpEl = document.getElementById('dp-display');
  if (dpEl) dpEl.textContent = dpText;
  // Store numeric DP in ch for PDF export
  extractNumericDP();
}

function getArmorDP() {
  if (!ch.gearSelections) return 'Select armor above to see DP.';
  const vals = Object.values(ch.gearSelections);
  for (const v of vals) {
    if (ARMOR_DP_MAP[v] !== undefined) {
      if (ARMOR_DP_MAP[v] === null) {
        // Light Leather = Agility × 3
        const agi = ch.attrs.AGI || 0;
        const dp  = agi * 3;
        ch.dp = dp;
        return `Light Leather Armor: DP = Agility (${agi}) × 3 = ${dp}`;
      }
      ch.dp = ARMOR_DP_MAP[v];
      return `${v}: ${ARMOR_DP_MAP[v]} DP`;
    }
  }
  ch.dp = 0;
  return 'No armor selected - 0 DP.';
}

function extractNumericDP() {
  if (!ch.gearSelections) return;
  const vals = Object.values(ch.gearSelections);
  for (const v of vals) {
    if (ARMOR_DP_MAP[v] !== undefined) {
      ch.dp = (ARMOR_DP_MAP[v] === null) ? ((ch.attrs.AGI||0) * 3) : ARMOR_DP_MAP[v];
      return;
    }
  }
  ch.dp = 0;
}


function autoFillGear() {
  if (!ch.specialty || !STARTING_GEAR[ch.specialty]) return;
  const items = [...STARTING_GEAR[ch.specialty].items];
  // Slot 0 = armor, rest go to back/belt in order
  let slotIdx = 0;
  items.forEach(item => {
    if (slotIdx < 6) { ch.equip[slotIdx] = item; slotIdx++; }
  });
  renderGearStep();
}


function toggleTalentView(name) {
  const alreadyPicked = (ch.talents||[]).includes(name);
  const isMartial  = MARTIAL_TALENTS.includes(name);
  const isSorcery  = SORCERY_TALENTS.includes(name);
  const currentMartial  = (ch.talents||[]).find(t => MARTIAL_TALENTS.includes(t));
  const currentSorcery  = (ch.talents||[]).find(t => SORCERY_TALENTS.includes(t));

  if (alreadyPicked) {
    // Clicking the already-selected talent: just view it (toggle detail view)
    ch._viewingTalent = (ch._viewingTalent === name) ? null : name;
  } else if (isMartial && currentMartial) {
    // Replace existing martial selection with this one
    removeTalentByName(currentMartial);
    addTalentFromView(name);
    ch._viewingTalent = name;
  } else if (isSorcery && currentSorcery) {
    // Replace existing sorcery selection with this one
    removeTalentByName(currentSorcery);
    addTalentFromView(name);
    ch._viewingTalent = name;
  } else {
    // Normal select
    addTalentFromView(name);
    ch._viewingTalent = name;
  }
  renderTalentStep();
}

function addTalentFromView(name) {
  if (!ch.talents) ch.talents = Array(9).fill('');
  // Check limits
  const isMartial = MARTIAL_TALENTS.includes(name);
  const isSorcery = SORCERY_TALENTS.includes(name);
  const isGeneral = GENERAL_TALENTS.includes(name);
  if (isMartial && ch.talents.filter(t=>MARTIAL_TALENTS.includes(t)).length >= 1) {
    alert('You can only select 1 Martial Talent at Level 1.'); return;
  }
  if (isSorcery && ch.talents.filter(t=>SORCERY_TALENTS.includes(t)).length >= 1) {
    alert('You can only select 1 Sorcery Talent at Level 1.'); return;
  }
  // Warlock: chosen Study becomes Patron's Gift in specialty talent
  if (isSorcery && ch.specialty === 'Warlock') {
    ch.specialtyTalent = name + " (Patron's Gift)";
  }
  if (isGeneral) {
    alert('General Talents are not selected during character creation. Only 1 Martial or Sorcery Talent is chosen at Level 1.'); return;
  }
  const emptyIdx = ch.talents.findIndex(t => !t);
  if (emptyIdx === -1) { alert('All talent slots are filled. Remove one first.'); return; }
  ch.talents[emptyIdx] = name;
  renderTalentStep();
}

function removeTalentByName(name) {
  if (!ch.talents) return;
  const idx = ch.talents.indexOf(name);
  if (idx !== -1) { ch.talents[idx] = ''; }
  if (ch._viewingTalent === name) ch._viewingTalent = null;
  // If Warlock removes their Study, reset specialty talent
  if (ch.specialty === 'Warlock' && WARLOCK_STUDIES.includes(name)) {
    ch.specialtyTalent = SPECIALTY_TALENT_TEXT['Warlock'] || 'Warlock Specialty Talent';
  }
  renderTalentStep();
}

function getTalentDescription(name) {
  // Returns HTML table of rank info for a talent, rank 1 row highlighted
  const t = TALENT_DATA[name];
  if (!t) return `<p style="font-style:italic;color:var(--muted)">Full details in the Realms of Legacy Talents chapter.</p>`;

  let html = `<table style="width:100%;border-collapse:collapse;font-size:.82rem;font-family:var(--font-ui)">
    <thead><tr>
      <th style="background:var(--head-bg);color:var(--head-txt);padding:6px 10px;text-align:left;width:70px">Rank</th>
      <th style="background:var(--head-bg);color:var(--head-txt);padding:6px 10px;text-align:left">Description</th>
    </tr></thead><tbody>`;
  t.forEach((row, i) => {
    const isR1 = i === 0;
    const bg   = isR1 ? 'background:var(--card-bg)9c4;font-weight:700' : (i%2===0?'background:#f7f7f7':'background:var(--card-bg)');
    html += `<tr style="${bg}">
      <td style="padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top;white-space:nowrap;font-weight:700;color:var(--cyan)">Rank ${i+1}${isR1?' ★':''}</td>
      <td style="padding:6px 10px;border-bottom:1px solid var(--border);line-height:1.45">${row}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  return html;
}


function startOver() {
  if (!confirm('Start over? All progress will be lost.')) return;
  location.reload();
}

function buildDicePool(attrKey, skillKey, modStr) {
  let attrVal = 0;
  if (attrKey === 'STR_AGI_HIGH') {
    const s = ch.attrs.STR || 0, a = ch.attrs.AGI || 0;
    attrVal = (s >= a) ? s : a;
  } else if (attrKey === 'STR') {
    attrVal = ch.attrs.STR || 0;
  } else if (attrKey === 'AGI') {
    attrVal = ch.attrs.AGI || 0;
  }
  const skillVal = ch.skills[skillKey] || 0;

  let d8s = 0, d6s = 0;
  if (attrVal === 0 && skillVal === 0) {
    d6s = 1;
  } else {
    const high = Math.max(attrVal, skillVal);
    const low  = Math.min(attrVal, skillVal);
    d8s = low;
    d6s = high - low;
  }

  // +1 mod adds 1d6
  if (modStr === '+1') d6s += 1;

  let parts = [];
  if (d8s > 0) parts.push(d8s + 'd8');
  if (d6s > 0) parts.push(d6s + 'd6');
  return parts.length ? parts.join('+') : '1d6';
}

function loadChar(event) {
  const file = event?.target?.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const ch = data.ch || data;
      if (!ch.cls) throw new Error('Not a valid RoL character file.');
      if ((ch.level||1) >= 20) { alert('This character is already at the maximum level (20).'); return; }
      baseChar = data;
      initEffective();
      initSession();
      buildSteps();
      document.getElementById('load-panel').style.display = 'none';
      document.getElementById('wizard').style.display = 'block';
      renderBanner();
      renderProgress();
      renderStep();
    } catch(err) {
      const el = document.getElementById('load-err');
      el.textContent = 'Error: ' + err.message;
      el.style.display = 'block';
    }
  };
  reader.readAsText(file);
}

function initEffective() {
  // baseChar.ch is always the fully-accumulated current character state.
  // levelHistory is stored separately for record-keeping but must NOT be
  // re-applied here — doing so would double-count every previous level-up gain.
  const ch = baseChar.ch || baseChar;
  eff = JSON.parse(JSON.stringify(ch));
  if (!eff.talents) eff.talents = Array(9).fill('');
  if (!eff.talentRanks) eff.talentRanks = Array(9).fill(1);
  if (!eff.skills) eff.skills = {};
  if (!eff.attrs) eff.attrs = {STR:0,AGI:0,WIT:0,EMP:0};
  if (!eff.hpMax) eff.hpMax = (eff.attrs.STR+eff.attrs.AGI)*2+4;
  if (!eff.mpMax) eff.mpMax = (eff.attrs.WIT+eff.attrs.EMP)*2+4;
}

function applyEntry(ch, entry) {
  if (entry.hpGain) ch.hpMax = (ch.hpMax||0) + entry.hpGain;
  if (entry.mpGain) ch.mpMax = (ch.mpMax||0) + entry.mpGain;
  if (entry.skillGains) entry.skillGains.forEach(({key,amount}) => { ch.skills[key]=(ch.skills[key]||0)+amount; });
  if (entry.attrGain) {
    ch.attrs[entry.attrGain.key] = (ch.attrs[entry.attrGain.key]||0)+1;
    if (['STR','AGI'].includes(entry.attrGain.key)) ch.hpMax = (ch.hpMax||0)+2;
    if (['WIT','EMP'].includes(entry.attrGain.key)) ch.mpMax = (ch.mpMax||0)+2;
  }
  if (entry.talentGain) {
    const {name,isNew} = entry.talentGain;
    if (isNew) {
      const ei = ch.talents.findIndex(t=>!t);
      if (ei !== -1) { ch.talents[ei]=name; ch.talentRanks[ei]=1; }
    } else {
      const ti = ch.talents.indexOf(name);
      if (ti !== -1) ch.talentRanks[ti]=(ch.talentRanks[ti]||1)+1;
    }
  }
  if (entry.level) ch.level = entry.level;
}
